server.port=8080

# MongoDB configuration
spring.data.mongodb.uri=mongodb://localhost:27017/shopflow

# Session cookie — these are CRITICAL for localhost cross-port requests
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
server.servlet.session.timeout=1d

# Spring Session — keep in memory (no Redis needed)
spring.session.store.type=none

# MongoDB automatically creates collections and indexes, no initialization needed